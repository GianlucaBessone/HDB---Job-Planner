<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDB Planner - Modo Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #0f172a;
        }
        .logo span {
            color: #2563eb;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 900;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HDB<span>Planner</span></div>
        <div class="icon">📡❌</div>
        <h1>Sin conexión</h1>
        <p>No tienes acceso a internet en este momento. Sin embargo, puedes seguir usando gran parte de la aplicación gracias a nuestro sistema offline.</p>
        <a href="/" class="btn">Reintentar Carga</a>
    </div>
    <script>
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
